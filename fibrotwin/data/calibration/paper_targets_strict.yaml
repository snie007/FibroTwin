version: 1
policy:
- 'Hard anchors only: numeric endpoints explicitly reported in paper results/figures/tables.'
- No template bands and no inferred placeholders.
- If no hard anchor is available, test stays unanchored.
strict_tests:
  T007:
    pmid: 32611237
    comparator: fold
    band:
    - 1.5
    - 2.5
    endpoint: pro-fibrotic pathway/protein increase in failing hearts
    source_excerpt: "EPRS was induced at mRNA and protein levels (~1.5\u20132.5 fold\
      \ increase) in failing hearts"
    source_level: abstract_text
unanchored_tests:
  T001:
    reason: 'reviewed batch01: angiogenesis narrative with timepoints but no explicit
      collagen/profibrotic magnitude extracted from machine-readable fulltext.'
  T002:
    reason: 'reviewed batch01: extracted numbers are journal/metadata identifiers;
      no endpoint effect-size found.'
  T003:
    reason: 'reviewed batch01: extracted numbers are mostly identifiers/protocol fields;
      no direct fibrosis effect-size found.'
  T004:
    reason: 'reviewed batch01: protocol/environment/time values extracted; no explicit
      fibrosis magnitude anchor found.'
  T005:
    reason: 'reviewed batch01: review-style citation ranges (e.g., 2-5, 8-10) not
      direct experimental endpoint magnitudes.'
  T006:
    reason: 'reviewed batch01: dose/time anchors (10 mg/kg, 3-7 days) and directional
      statements; no explicit comparable effect-size number.'
  T008:
    reason: mentions improved function at 6 weeks without explicit %/absolute effect
      size extracted
  T009:
    reason: 'reviewed batch01: p-values and directional comparisons present; no explicit
      absolute/%/fold endpoint magnitude extracted.'
